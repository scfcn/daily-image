    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "STDongGuanTi", "Segoe UI", Tahoma, Geneva, Verdana,
          sans-serif;
        color: #e0e0e0;
        background-color: #121212;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* 悬浮菜单 */
      .floating-menu {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        display: flex;
        background: rgba(30, 30, 30, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
        overflow: hidden;
      }
      .floating-menu::after {
        content: "";
        width: 15px;
        border-radius: 30px;
      }
    
      .menu-item {
        display: flex;
        align-items: center;
        padding: 5px 10px;
        color: #e0e0e0;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .menu-item:hover {
        color: #fff;
        border-bottom: 1px solid #fff;
      }
      .menu-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
      }
      @media (max-width: 500px) {
        .floating-menu {
          display: none;
        }
      }

      /* Hero Section */
      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hero:hover img {
        transform: scale(1.02);
      }
      .hero .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.8),
          transparent 40%
        );
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 40px;
        color: #fff;
      }
      .hero .center-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
      }
      .hero .center-text h1 {
        font-size: 3rem;
        font-weight: 300;
        margin-bottom: 15px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      }
      .hero .center-text p {
        font-size: 1.2rem;
        max-width: 600px;
        margin: 0 auto;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      }
      .hero .overlay .date {
        font-size: 2rem;
        margin-bottom: 10px;
        font-weight: 300;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }
      .hero .overlay .copy {
        font-size: 1.2rem;
        max-width: 1000px;
        font-weight: 300;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      /* 一言样式 */
      .yiyan {
        background: #1e1e1e;
        color: #e0e0e0;
        padding: 40px 0 20px 0;
        text-align: center;
        font-size: 1.2rem;
        line-height: 1.8;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        position: relative;
      }
      
      .yiyan-content {
        max-width: 800px;
        margin: 0 auto;
        font-weight: 300;
        position: relative;
        padding: 20px 20px;
        margin: 0 20px;
      }

      /* 添加左上角和右下角的直角装饰 */
      .yiyan-content::before,
      .yiyan-content::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255, 255, 255, 0.3);
        border-style: solid;
      }

      .yiyan-content::before {
        top: 0;
        left: 0;
        border-width: 2px 0 0 2px;
      }

      .yiyan-content::after {
        bottom: 0;
        right: 0;
        border-width: 0 2px 2px 0;
      }
      
      .yiyan-loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      .yiyan-signature {
        width: 760px;
        max-width: 100%;
        text-align: right;
        padding: 20px 0;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* History Grid */
      .history-container {
        padding: 40px 20px;
        background: #1e1e1e;
        flex: 1;
      }

      .filter-section {
        max-width: 1200px;
        margin: 0 auto 30px;
        padding: 20px;
        background: rgba(45, 45, 45, 0.5);
        border-radius: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
        justify-content: center;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .filter-group label {
        color: #e0e0e0;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .filter-select {
        padding: 8px 16px;
        background: #2d2d2d;
        color: #e0e0e0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        min-width: 120px;
      }

      .filter-select:hover {
        border-color: rgba(255, 255, 255, 0.3);
        background: #3d3d3d;
      }

      .filter-select:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      }

      .filter-info {
        margin-left: auto;
        color: #aaa;
        font-size: 0.9rem;
      }

      .filter-info span {
        color: #e0e0e0;
        font-weight: 500;
      }

      .history {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin: 0 auto;
        max-width: 1200px;
      }

      @media (max-width: 1200px) {
        .history {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 768px) {
        .history {
          grid-template-columns: 1fr;
        }
        .filter-section {
          flex-direction: column;
          align-items: stretch;
        }
        .filter-info {
          margin-left: 0;
          text-align: center;
        }
      }

      .loading-more {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 30px;
        color: #aaa;
        font-size: 0.95rem;
      }

      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* 图片加载过渡效果 */
      .img-loading {
        filter: blur(20px);
        opacity: 0;
        transform: scale(1.1);
        transition: filter 0.8s ease, opacity 0.8s ease, transform 0.8s ease;
        background: #2d2d2d;
      }

      .img-loading.img-loaded {
        filter: blur(0);
        opacity: 1;
        transform: scale(1);
      }

      .card {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      }
      .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
      }
      .card:hover img {
        transform: scale(1.05);
      }
      .card .date-label {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }
      .card .copy-text {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 15px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        color: #fff;
        font-size: 0.9rem;
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s ease;
      }
      .card:hover .date-label {
        opacity: 0;
        transform: translateY(10px);
      }
      .card:hover .copy-text {
        opacity: 1;
        transform: translateY(0);
      }

      .img-error {
        opacity: 0.6;
        filter: grayscale(100%);
      }

      /* 更新后的Modal样式 */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(30, 30, 30, 0);
        backdrop-filter: blur(0);
        z-index: 1000;
        display: none; /* 初始隐藏 */
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease, background 0.3s ease, backdrop-filter 0.3s ease;
      }

      .modal.active {
        opacity: 1;
        visibility: visible;
        background: rgba(30, 30, 30, 0.9);
        backdrop-filter: blur(10px);
      }

      .modal-content {
        max-width: 90%;
        max-height: 90%;
        transform: scale(0.95);
        transition: transform 0.3s ease, opacity 0.3s ease;
        opacity: 0;
      }

      .modal.active .modal-content {
        transform: scale(1);
        opacity: 1;
      }

      .modal-img-container {
        position: relative;
        max-width: 100%;
        max-height: 80vh;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }

      .modal-img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        display: block;
      }

      .modal-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 30px 20px 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        color: #fff;
        text-align: center;
        transform: translateY(100%);
        opacity: 0;
        transition: all 0.3s ease;
      }

      .modal-img-container:hover .modal-caption {
        transform: translateY(0);
        opacity: 1;
      }

      .modal-close {
        position: absolute;
        top: 30px;
        right: 30px;
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
        background: none;
        border: none;
        transition: transform 0.3s ease;
        opacity: 0.7;

      .modal-close:hover {

      /* 页脚样式 */

      }

      #vercount_value_site_uv {
        font-weight: bold;
        color: #e0e0e0;
      }

      <script>
        // 动态年份显示
        document.getElementById("year").textContent = new Date().getFullYear();
        
        // 计算网站运行时间和下次更新时间
        function updateTimes() {
          // 网站开始运行的日期（请修改为您的网站上线日期）
          const startDate = new Date('2025-8-23'); // 示例日期，请替换为实际上线日期
          const now = new Date();
          
          // 计算已运行天数
          const runningDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
          document.getElementById("running-days").textContent = runningDays + " 天";
          
          // 计算距离下次更新的时间
          const tomorrow = new Date(now);
          tomorrow.setDate(tomorrow.getDate() + (now.getHours() >= 12 ? 1 : 0));
          tomorrow.setHours(12, 0, 0, 0);
          
          // 计算剩余时间
          let diff = tomorrow - now;
          const hours = Math.floor(diff / (1000 * 60 * 60));
          diff -= hours * 1000 * 60 * 60;
          const minutes = Math.floor(diff / (1000 * 60));
          diff -= minutes * 1000 * 60;
          const seconds = Math.floor(diff / 1000);
          
          // 格式化显示
          document.getElementById("next-update").textContent = 
            `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 初始更新
        updateTimes();
        
        // 每秒更新一次倒计时
        setInterval(updateTimes, 1000);
      </script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("imageModal");
        const modalImage = document.getElementById("modalImage");
        const modalCaption = document.getElementById("modalCaption");
        const modalClose = document.getElementById("modalClose");

        function closeModal() {
          modal.classList.remove("active");
          setTimeout(() => {
            modal.style.display = "none";
          }, 300);
        }

        function showModal() {
          modal.style.display = "flex";
          void modal.offsetWidth;
          modal.classList.add("active");
        }

        modalClose.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && modal.classList.contains("active")) closeModal();
        });

        const yiyanContent = document.querySelector('.yiyan-content');
        fetch('https://v2.xxapi.cn/api/yiyan?type=hitokoto')
          .then(response => response.json())
          .then(data => {
            if (data.code === 200 && data.data) {
              yiyanContent.innerHTML = `<span style="opacity: 0; transition: opacity 1s ease;">${data.data}</span>`;
              setTimeout(() => {
                const textSpan = yiyanContent.querySelector('span');
                if (textSpan) textSpan.style.opacity = '1';
              }, 100);
            } else {
              yiyanContent.textContent = '生活，是一场无法回放的电影，我们都是自己的导演。';
            }
          })
          .catch(error => {
            console.error('获取一言失败:', error);
            yiyanContent.textContent = '生活，是一场无法回放的电影，我们都是自己的导演。';
          });

        const LAZY_LOAD_CONFIG = {
          rootMargin: '200px',
          threshold: 0.01,
          preloadThreshold: 300,
          maxConcurrentLoads: 4,
          batchSize: 20
        };

        let allImageData = [];
        let filteredData = [];
        let currentBatch = 0;
        let loadingQueue = [];
        let activeLoads = 0;
        let observer = null;

        class ImageLoader {
          constructor() {
            this.observer = new IntersectionObserver(
              this.handleIntersection.bind(this),
              {
                rootMargin: LAZY_LOAD_CONFIG.rootMargin,
                threshold: LAZY_LOAD_CONFIG.threshold
              }
            );
            this.pendingImages = new Map();
          }

          handleIntersection(entries) {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;
                if (src && !img.dataset.loaded) {
                  this.loadImage(img, src);
                }
              }
            });
          }

          loadImage(img, src) {
            if (activeLoads >= LAZY_LOAD_CONFIG.maxConcurrentLoads) {
              loadingQueue.push({ img, src });
              return;
            }

            activeLoads++;
            img.classList.add('img-loading');

            const loader = new Image();
            loader.src = src;

            loader.onload = () => {
              img.src = src;
              img.classList.add('img-loaded');
              img.dataset.loaded = 'true';
              activeLoads--;
              this.processQueue();
            };

            loader.onerror = () => {
              img.classList.remove('img-loading');
              img.classList.add('img-error');
              img.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMmQyZDJkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM2NjYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPueahOaWh+eroDwvdGV4dD48L3N2Zz4=';
              console.error("图片加载失败:", src);
              activeLoads--;
              this.processQueue();
            };

            this.observer.unobserve(img);
          }

          processQueue() {
            while (loadingQueue.length > 0 && activeLoads < LAZY_LOAD_CONFIG.maxConcurrentLoads) {
              const { img, src } = loadingQueue.shift();
              this.loadImage(img, src);
            }
          }

          observe(img) {
            this.observer.observe(img);
          }

          disconnect() {
            this.observer.disconnect();
          }
        }

        const imageLoader = new ImageLoader();

        function parseDate(dateStr) {
          const parts = dateStr.split('-');
          if (parts.length === 3) {
            return {
              year: parts[0],
              month: parts[1],
              day: parts[2],
              full: dateStr
            };
          }
          return null;
        }

        function populateYearFilter(data) {
          const yearSelect = document.getElementById('year-filter');
          const years = new Set();
          
          data.forEach(item => {
            const dateInfo = parseDate(item.date);
            if (dateInfo) {
              years.add(dateInfo.year);
            }
          });

          const sortedYears = Array.from(years).sort((a, b) => b.localeCompare(a));
          
          sortedYears.forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year + '年';
            yearSelect.appendChild(option);
          });
        }

        function filterData() {
          const yearFilter = document.getElementById('year-filter').value;
          const monthFilter = document.getElementById('month-filter').value;

          filteredData = allImageData.filter(item => {
            const dateInfo = parseDate(item.date);
            if (!dateInfo) return false;

            const yearMatch = yearFilter === 'all' || dateInfo.year === yearFilter;
            const monthMatch = monthFilter === 'all' || dateInfo.month === monthFilter;

            return yearMatch && monthMatch;
          });

          updateImageCount();
          currentBatch = 0;
          renderImages();
        }

        function updateImageCount() {
          const countEl = document.getElementById('image-count');
          countEl.textContent = `共 ${filteredData.length} 张图片`;
        }

        function createCard(item, index) {
          const card = document.createElement("div");
          card.className = "card";
          card.style.opacity = "0";
          card.style.transform = "translateY(50px)";
          card.style.transition = "opacity 1.0s cubic-bezier(.4,2,.6,1), transform 1.0s cubic-bezier(.4,2,.6,1)";

          const img = document.createElement("img");
          img.alt = item.date;
          img.className = "img-loading";
          img.dataset.src = item.path;
          img.src = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMmQyZDJkIi8+PC9zdmc+";

          const dateLabel = document.createElement("div");
          dateLabel.className = "date-label";
          dateLabel.textContent = item.date;

          const copyText = document.createElement("div");
          copyText.className = "copy-text";
          copyText.textContent = item.copyright;

          card.appendChild(img);
          card.appendChild(dateLabel);
          card.appendChild(copyText);

          card.addEventListener("click", () => {
            modalImage.src = item.path;
            modalCaption.textContent = `${item.date} - ${item.copyright}`;
            showModal();
          });

          return card;
        }

        function renderImages() {
          const historyEl = document.getElementById("history");
          historyEl.innerHTML = '';

          const start = currentBatch * LAZY_LOAD_CONFIG.batchSize;
          const end = start + LAZY_LOAD_CONFIG.batchSize;
          const batch = filteredData.slice(start, end);

          batch.forEach((item, index) => {
            const card = createCard(item, index);
            historyEl.appendChild(card);

            const img = card.querySelector('img');
            imageLoader.observe(img);

            setTimeout(() => {
              card.style.opacity = "1";
              card.style.transform = "translateY(0)";
            }, index * 50);
          });

          if (end < filteredData.length) {
            document.getElementById('loading-more').style.display = 'flex';
          } else {
            document.getElementById('loading-more').style.display = 'none';
          }
        }

        function loadMoreImages() {
          let end = (currentBatch + 1) * LAZY_LOAD_CONFIG.batchSize;
          if (end >= filteredData.length) return;

          currentBatch++;
          const historyEl = document.getElementById("history");
          const start = currentBatch * LAZY_LOAD_CONFIG.batchSize;
          end = start + LAZY_LOAD_CONFIG.batchSize;
          const batch = filteredData.slice(start, end);

          batch.forEach((item, index) => {
            const card = createCard(item, index);
            historyEl.appendChild(card);

            const img = card.querySelector('img');
            imageLoader.observe(img);

            setTimeout(() => {
              card.style.opacity = "1";
              card.style.transform = "translateY(0)";
            }, index * 50);
          });

          if (end >= filteredData.length) {
            document.getElementById('loading-more').style.display = 'none';
          }
        }

        const yearFilter = document.getElementById('year-filter');
        const monthFilter = document.getElementById('month-filter');

        yearFilter.addEventListener('change', filterData);
        monthFilter.addEventListener('change', filterData);

        window.addEventListener('scroll', () => {
          const scrollPosition = window.innerHeight + window.scrollY;
          const pageHeight = document.documentElement.scrollHeight;

          if (scrollPosition >= pageHeight - 500) {
            loadMoreImages();
          }
        });

        fetch("/picture/index.json")
          .then(res => res.json())
          .then(data => {
            if (!Array.isArray(data) || data.length === 0) {
              console.error("index.json 内容不合法");
              return;
            }

            allImageData = data;
            filteredData = [...data];

            const today = data[0];
            const heroImg = document.getElementById("hero-img");
            document.getElementById("hero-date").textContent = today.date;
            document.getElementById("hero-copy").textContent = today.copyright;

            const heroLoader = new Image();
            heroLoader.src = today.path;
            heroLoader.onload = () => {
              heroImg.src = today.path;
              heroImg.classList.add("img-loaded");
            };

            populateYearFilter(data);
            
            const now = new Date();
            const currentYear = now.getFullYear().toString();
            const currentMonth = (now.getMonth() + 1).toString().padStart(2, '0');
            
            document.getElementById('year-filter').value = currentYear;
            document.getElementById('month-filter').value = currentMonth;
            
            filterData();
          })
          .catch(error => {
            console.error("加载数据失败:", error);
            document.getElementById('image-count').textContent = '加载失败';
          });
      });
    </script>
  </body>
</html>
